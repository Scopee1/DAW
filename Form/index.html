<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

  <h1>Suscribite</h1>

  <form action="#" method="POST">

    <label>Nombre:</label><br>
    <input type="text" placeholder="Ej: Ana" required><br><br>

    <label>Apellido:</label><br>
    <input type="text" placeholder="Ej: García"><br><br>

    <label>Correo electrónico:</label><br>
    <input type="email" placeholder="tu@email.com" required><br><br>

    <label>Frecuencia de envío:</label><br>
    <select>
      <option value="">Seleccioná una opción</option>
      <option value="diario">Diario</option>
      <option value="semanal">Semanal</option>
      <option value="mensual">Mensual</option>
    </select><br><br>

    <input type="checkbox">
    <label for="novedades">Quiero recibir novedades y actualizaciones</label><br><br>

    <input type="checkbox" required>
    <label for="terminos">Acepto los términos y condiciones</label><br><br>

    <button type="submit">Suscribirme</button>

  </form>

</body>
</html>
